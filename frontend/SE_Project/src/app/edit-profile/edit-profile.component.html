<div @pageAnimation>
  <app-header></app-header>

  <div class="profile-page">
    <div class="container">
      <h1 class="pg-title">// EDIT PROFILE</h1>

      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="profile-form" novalidate>
        <div class="px-field">
          <label class="px-label" for="pf-name">FULL NAME *</label>
          <input id="pf-name" class="px-input" type="text" formControlName="full_name" placeholder="Dr. Ada Lovelace" />
          <span class="px-error" *ngIf="profileForm.get('full_name')?.touched && profileForm.get('full_name')?.invalid">
            ▸ Full name is required.
          </span>
        </div>

        <div class="px-field">
          <label class="px-label" for="pf-aff">AFFILIATION</label>
          <input id="pf-aff" class="px-input" type="text" formControlName="affiliation" placeholder="University of Florida" />
        </div>

        <div class="px-field">
          <label class="px-label" for="pf-bio">BIO</label>
          <textarea id="pf-bio" class="px-input px-textarea" formControlName="bio" rows="4" placeholder="A short bio about your research…"></textarea>
        </div>

        <div class="px-field">
          <label class="px-label" for="pf-email">EMAIL (READ-ONLY)</label>
          <input id="pf-email" class="px-input px-input--readonly" type="email" formControlName="email" readonly />
        </div>

        <button type="submit" class="px-btn profile-form__submit">▶ SAVE PROFILE</button>
      </form>
    </div>
  </div>
</div>
