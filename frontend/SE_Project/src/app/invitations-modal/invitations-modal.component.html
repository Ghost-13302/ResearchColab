<div class="px-modal-backdrop" (click)="onClose()">
  <div class="px-modal" (click)="$event.stopPropagation()">
    <div class="px-modal__header">
      <h2 class="px-modal__title">// INVITATIONS</h2>
      <button class="px-modal__close" (click)="onClose()">✕</button>
    </div>

    <div class="px-modal__body">
      <p class="px-modal__loading" *ngIf="loading()">[ LOADING… ]</p>

      <ng-container *ngIf="!loading()">
        <ng-container *ngIf="invitations().length; else none">
          <div *ngFor="let inv of invitations()" class="inv-card">
            <div class="inv-card__head">
              <span class="inv-project">{{ inv.project_title }}</span>
              <span class="px-badge px-badge--open">PENDING</span>
            </div>
            <p class="inv-meta">Invited by <strong>{{ inv.email }}</strong></p>
            <p class="inv-role">Role: <em>{{ inv.role | uppercase }}</em></p>
            <div class="inv-actions">
              <button class="px-btn px-btn--green" (click)="accept(inv)">▶ ACCEPT</button>
              <button class="px-btn px-btn--danger" (click)="reject(inv)">✕ REJECT</button>
            </div>
          </div>
        </ng-container>

        <ng-template #none>
          <div class="inv-empty">
            <span class="inv-empty__icon">📭</span>
            <p>NO PENDING INVITATIONS</p>
          </div>
        </ng-template>
      </ng-container>
    </div>
  </div>
</div>
