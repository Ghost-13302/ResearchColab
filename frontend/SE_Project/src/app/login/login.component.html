<div class="auth-overlay" @pageAnimation>
  <div class="auth-card px-card">
    <!-- Header bar -->
    <div class="auth-card__header">
      <span class="auth-card__title">// LOG IN</span>
      <button class="auth-card__close" (click)="onBack()" aria-label="Close">✕</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" novalidate>
      <!-- Email -->
      <div class="px-field">
        <label class="px-label" for="login-email">EMAIL ADDRESS</label>
        <input
          id="login-email"
          class="px-input"
          type="email"
          formControlName="email"
          placeholder="researcher@university.edu"
          autocomplete="email"
        />
        <span
          class="px-error"
          *ngIf="form.get('email')?.touched && form.get('email')?.invalid"
        >
          ▸ Enter a valid email.
        </span>
      </div>

      <!-- Password -->
      <div class="px-field">
        <label class="px-label" for="login-pw">PASSWORD</label>
        <div class="input-row">
          <input
            id="login-pw"
            class="px-input"
            [type]="hide() ? 'password' : 'text'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-pw"
            (click)="hide.set(!hide())"
            [attr.aria-label]="hide() ? 'Show password' : 'Hide password'"
          >{{ hide() ? '👁' : '🙈' }}</button>
        </div>
        <span
          class="px-error"
          *ngIf="form.get('password')?.touched && form.get('password')?.invalid"
        >
          ▸ Password is required.
        </span>
      </div>

      <!-- API error -->
      <p class="auth-error" *ngIf="errorMessage()">⚠ {{ errorMessage() }}</p>

      <!-- Actions -->
      <div class="auth-actions">
        <button
          type="submit"
          class="px-btn auth-actions__submit"
          [disabled]="loading()"
        >
          {{ loading() ? 'LOADING…' : '▶ SIGN IN' }}
        </button>
        <button type="button" class="px-btn px-btn--ghost auth-actions__alt" (click)="onSignup()">
          NEW PLAYER?
        </button>
      </div>
    </form>
  </div>
</div>
