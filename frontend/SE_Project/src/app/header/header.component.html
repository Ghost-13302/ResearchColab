<header class="px-header">
  <div class="px-header__inner container">

    <!-- Logo -->
    <div class="px-header__logo" (click)="goHome()">
      <img src="assets/icons/the-grid-icon.svg" alt="" class="px-header__icon" />
      <span class="px-header__brand">THE GRID</span>
    </div>

    <!-- Desktop Nav -->
    <nav class="px-header__nav">
      <a class="px-nav-link" (click)="goToAbout()">ABOUT</a>
      <a class="px-nav-link" (click)="goToProjects()">PROJECTS</a>
      <a class="px-nav-link" (click)="goToInvitations()">INVITES</a>
    </nav>

    <!-- Auth buttons -->
    <div class="px-header__auth" *ngIf="!isLoggedIn()">
      <button class="px-btn px-btn--ghost" (click)="openLogin()">LOG IN</button>
      <button class="px-btn" (click)="openRegister()">SIGN UP</button>
    </div>

    <!-- Profile dropdown -->
    <div class="px-header__user" *ngIf="isLoggedIn()">
      <button class="px-user-btn" (click)="toggleDropdown()">
        <span class="px-user-btn__text">▶ PLAYER</span>
        <span class="px-user-btn__arrow">{{ dropdownOpen() ? '▲' : '▼' }}</span>
      </button>
      <div class="px-dropdown" *ngIf="dropdownOpen()">
        <a class="px-dropdown__item" (click)="goToProfile()">▸ EDIT PROFILE</a>
        <a class="px-dropdown__item px-dropdown__item--danger" (click)="logout()">▸ LOGOUT</a>
      </div>
    </div>

    <!-- Mobile burger -->
    <button class="px-burger" (click)="mobileMenuOpen.set(!mobileMenuOpen())" aria-label="Toggle menu">
      {{ mobileMenuOpen() ? '✕' : '≡' }}
    </button>
  </div>

  <!-- Mobile menu -->
  <div class="px-mobile-menu" *ngIf="mobileMenuOpen()">
    <a class="px-mobile-link" (click)="goToAbout()">▸ ABOUT</a>
    <a class="px-mobile-link" (click)="goToProjects()">▸ PROJECTS</a>
    <a class="px-mobile-link" (click)="goToInvitations()">▸ INVITES</a>
    <div class="px-mobile-divider"></div>
    <ng-container *ngIf="!isLoggedIn()">
      <a class="px-mobile-link" (click)="openLogin()">▸ LOG IN</a>
      <a class="px-mobile-link px-mobile-link--accent" (click)="openRegister()">▸ SIGN UP</a>
    </ng-container>
    <ng-container *ngIf="isLoggedIn()">
      <a class="px-mobile-link" (click)="goToProfile()">▸ PROFILE</a>
      <a class="px-mobile-link px-mobile-link--danger" (click)="logout()">▸ LOGOUT</a>
    </ng-container>
  </div>
</header>

<!-- ── Auth Modals (rendered over current page) ── -->
<app-login
  *ngIf="showLoginModal()"
  [isModal]="true"
  (close)="closeAuth()"
  (switchToRegister)="openRegister()">
</app-login>

<app-registration
  *ngIf="showRegisterModal()"
  [isModal]="true"
  (close)="closeAuth()"
  (switchToLogin)="openLogin()">
</app-registration>

<!-- ── Invitations Modal ── -->
<app-invitations-modal
  *ngIf="showInvitationsModal()"
  (close)="hideInvitationsModal()">
</app-invitations-modal>
