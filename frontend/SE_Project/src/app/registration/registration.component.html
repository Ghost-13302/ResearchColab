<div class="auth-overlay" @pageAnimation>
  <div class="auth-card px-card">
    <div class="auth-card__header">
      <span class="auth-card__title">// CREATE ACCOUNT</span>
      <button class="auth-card__close" (click)="onBack()" aria-label="Close">✕</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" novalidate>
      <!-- Email -->
      <div class="px-field">
        <label class="px-label" for="reg-email">EMAIL ADDRESS</label>
        <input
          id="reg-email"
          class="px-input"
          type="email"
          formControlName="email"
          placeholder="researcher@university.edu"
          autocomplete="email"
        />
        <span class="px-error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">▸ Email is required.</span>
        <span class="px-error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">▸ Enter a valid email address.</span>
      </div>

      <!-- Password -->
      <div class="px-field">
        <label class="px-label" for="reg-pw">PASSWORD</label>
        <div class="input-row">
          <input
            id="reg-pw"
            class="px-input"
            [type]="hide() ? 'password' : 'text'"
            formControlName="password"
            placeholder="Min. 8 characters"
            autocomplete="new-password"
          />
          <button type="button" class="toggle-pw" (click)="hide.set(!hide())">{{ hide() ? '👁' : '🙈' }}</button>
        </div>
        <span class="px-error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('required')">▸ Password is required.</span>
        <span class="px-error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')">▸ Must be at least 8 characters.</span>
      </div>

      <!-- Confirm Password -->
      <div class="px-field">
        <label class="px-label" for="reg-cpw">CONFIRM PASSWORD</label>
        <input
          id="reg-cpw"
          class="px-input"
          type="password"
          formControlName="confirmPwd"
          placeholder="Repeat your password"
          autocomplete="new-password"
        />
        <span class="px-error" *ngIf="form.get('confirmPwd')?.touched && form.hasError('passwordsMismatch')">▸ Passwords do not match.</span>
      </div>

      <div class="auth-actions">
        <button type="submit" class="px-btn auth-actions__submit" [disabled]="loading()">
          {{ loading() ? 'CREATING…' : '▶ CREATE ACCOUNT' }}
        </button>
        <button type="button" class="px-btn px-btn--ghost auth-actions__alt" (click)="onLogin()">
          ALREADY HAVE ACCOUNT?
        </button>
      </div>
    </form>
  </div>
</div>
