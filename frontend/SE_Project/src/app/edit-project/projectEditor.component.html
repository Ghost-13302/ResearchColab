<div @pageAnimation>
  <app-header></app-header>

  <div class="editor-page">
    <div class="container">
      <h1 class="pg-title">// EDIT PROJECT</h1>

      <form [formGroup]="projectForm" class="editor-form">
        <!-- Title -->
        <mat-form-field appearance="outline">
          <mat-label>Title *</mat-label>
          <input matInput formControlName="title" placeholder="Project title" />
          <mat-error *ngIf="projectForm.get('title')?.hasError('required')">Title is required.</mat-error>
        </mat-form-field>

        <!-- Description -->
        <mat-form-field appearance="outline">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="4" placeholder="Describe your project…"></textarea>
        </mat-form-field>

        <!-- Skills chip input -->
        <mat-form-field appearance="outline">
          <mat-label>Required Skills</mat-label>
          <mat-chip-grid #chipGrid>
            @for (skill of skills(); track skill) {
              <mat-chip-row (removed)="handleDeleteSkill(skill)">
                {{ skill }}<button matChipRemove><mat-icon>cancel</mat-icon></button>
              </mat-chip-row>
            }
            <input
              [placeholder]="skills().length === 0 ? 'Type skill + Enter' : ''"
              [matChipInputFor]="chipGrid"
              [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
              [matChipInputAddOnBlur]="addOnBlur"
              (matChipInputTokenEnd)="handleAddSkill($event)"
            />
          </mat-chip-grid>
        </mat-form-field>

        <!-- Status -->
        <mat-form-field appearance="outline">
          <mat-label>Status *</mat-label>
          <mat-select formControlName="status">
            @for (opt of statusOptions; track opt) {
              <mat-option [value]="opt">{{ opt | titlecase }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <!-- Visibility -->
        <mat-form-field appearance="outline">
          <mat-label>Visibility *</mat-label>
          <mat-select formControlName="visibility">
            @for (opt of visibilityOptions; track opt) {
              <mat-option [value]="opt">{{ opt | titlecase }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <div class="editor-actions">
          <button type="button" class="px-btn" (click)="handleSave()">▶ SAVE PROJECT</button>
          <button type="button" class="px-btn px-btn--outline" (click)="openInviteModal()">+ INVITE</button>
        </div>
      </form>
    </div>
  </div>
</div>

<app-invite-collaborator-modal
  *ngIf="showInviteModal()"
  [projectId]="projectId"
  (close)="closeInviteModal()">
</app-invite-collaborator-modal>
