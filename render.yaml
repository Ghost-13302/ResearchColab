databases:
  - name: researchcolab-db
    databaseName: researchcolab
    user: researchcolab
    plan: free

services:
  - type: web
    name: researchcolab-backend
    runtime: go
    rootDir: backend
    buildCommand: go build -o app .
    startCommand: ./app
    plan: free
    envVars:
      - key: GIN_MODE
        value: release
      - key: DATABASE_URL
        fromDatabase:
          name: researchcolab-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://swecrocs.github.io,https://ghost-13302.github.io,http://localhost:4200
    healthCheckPath: /swagger/index.html
